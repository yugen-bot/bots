name: "Lint"

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - shared
          - apps/hoshi
          - apps/iro
          - apps/kazu
          - apps/kusari
          - apps/koto

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: ${{ matrix.module }}
          args: --timeout=5m
