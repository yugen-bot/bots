root = "../../"
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
args_bin = []
bin = "./dist/koto"
cmd = "make build"
delay = 1000
exclude_dir = [
	"tmp",
	"apps/iro",
	"apps/kazu",
	"apps/hoshi",
	"apps/kusari",
	"apps/koto/assets",
	"apps/koto/tmp",
	"apps/koto/vendor",
	"apps/koto/testdata",
	"apps/koto/prisma/migrations/",
	"apps/koto/prisma/db/",
]
exclude_file = []
exclude_regex = ["_test.go"]
exclude_unchanged = false
follow_symlink = false
full_bin = ""
include_dir = []
include_ext = ["go", "tpl", "tmpl", "html"]
include_file = []
kill_delay = "5s"
log = "./build-errors.log"
poll = false
poll_interval = 0
post_cmd = []
pre_cmd = []
rerun = false
rerun_delay = 500
send_interrupt = true
stop_on_error = true

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
main_only = false
time = false

[misc]
clean_on_exit = false

[screen]
clear_on_rebuild = false
keep_scroll = false
